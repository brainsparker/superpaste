name = "superpaste-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "SUPERPASTE_KV"
id = "928b1c1767d94ee9881855b2703f0ca8"

[vars]
# Hard ceiling on total /v1/messages requests per UTC day across ALL users —
# the spend kill switch. ~$0.01/request on Sonnet 4.6, so 500 ≈ $5/day max.
# Raise via `wrangler deploy` after editing, no code change needed.
GLOBAL_DAILY_LIMIT = "500"

# Per-IP burst limits (Cloudflare Rate Limiting API). Stops device-ID rotation
# and endpoint hammering from a single source. Limits are per `period` seconds.
[[unsafe.bindings]]
name = "IP_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "VALIDATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

# Production route — update once you've added the custom domain in Cloudflare dashboard
# [env.production]
# routes = [{ pattern = "api.superpaste.app/v1/*", zone_name = "superpaste.app" }]
