name = "superpaste-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "SUPERPASTE_KV"
id = "928b1c1767d94ee9881855b2703f0ca8"

[vars]
# Daily spend kill switches, split by tier so trial abuse can't lock out
# paying customers. With compressed JPEG captures a request costs well under
# $0.01 on Sonnet, so 300 trial + 2000 licensed ≈ low-single-digit $/day max.
# Raise via `wrangler deploy` after editing, no code change needed.
GLOBAL_TRIAL_DAILY_LIMIT = "300"
GLOBAL_LICENSED_DAILY_LIMIT = "2000"

# Per-IP burst limits (Cloudflare Rate Limiting API). Stops device-ID rotation
# and endpoint hammering from a single source. Limits are per `period` seconds.
[[unsafe.bindings]]
name = "IP_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "VALIDATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

# Production route — update once you've added the custom domain in Cloudflare dashboard
# [env.production]
# routes = [{ pattern = "api.superpaste.app/v1/*", zone_name = "superpaste.app" }]
